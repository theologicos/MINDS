<div class="dropdown-panel hidden" id="notificationDropdown">
    <div class="dropdown-header">
        <h4>Notifications</h4>
        {% if unread_notif_count %}
            <a href="{% url 'notifications:mark_all_read' %}" class="dropdown-link">Mark all read</a>
        {% endif %}
    </div>
    <div class="dropdown-body">
        {% for notif in recent_notifications %}
            <a href="{% if notif.memo %}{% url 'memos:detail' notif.memo.id %}{% else %}{% url 'notifications:list' %}{% endif %}"
               class="dropdown-item {% if not notif.is_read %}unread{% endif %}">
                <div class="dropdown-item-icon"><i class="fa-solid fa-envelope"></i></div>
                <div class="dropdown-item-content">
                    <p>{{ notif.message }}</p>
                    <span>{{ notif.created_at|timesince }} ago</span>
                </div>
            </a>
        {% empty %}
            <div class="empty-state" style="padding: var(--space-8);">
                <i class="fa-regular fa-bell-slash"></i>
                <h3>No notifications</h3>
                <p>You're all caught up.</p>
            </div>
        {% endfor %}
    </div>
    <div class="dropdown-footer">
        <a href="{% url 'notifications:list' %}">View all notifications</a>
    </div>
</div>
